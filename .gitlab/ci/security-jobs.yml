trivy_fs_scan:
  stage: security
  image: node:18
  before_script:
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  script:
    - ./bin/trivy fs . --exit-code 1 --severity HIGH,CRITICAL
  rules:
    - if:
        '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME ==
        "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      when: always
    - when: never

owasp_dep_check:
  stage: security
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  variables:
    JAVA_OPTS: "-Xmx4g"
    # Path to your cached NVD database on the runner host
    NVD_CACHE_HOST_PATH: "/opt/nvd-cache"
  before_script: []
  script:
    - |
      cd "$CI_PROJECT_DIR"
      mkdir -p owasp-report
      echo "Current directory: $(pwd)"
      echo "Scanning directory contents:"
      ls -la ./client || echo "Client directory not found"
      ls -la /nvd-cache/ || echo "NVD cache not found"

      # Run dependency-check with pre-cached database (no updates)
      /usr/share/dependency-check/bin/dependency-check.sh \
        --project "forminit" \
        --scan ./client \
        --scan ./backend \
        --format HTML \
        --format JSON \
        --out owasp-report/ \
        --data /nvd-cache \
        --noupdate \
        --enableExperimental \
        --failOnCVSS 7 \
        --exclude "**/node_modules/**" \
        --exclude "**/test/**" \
        --exclude "**/tests/**" \
        --exclude "**/*.min.js" \
        --exclude "**/coverage/**" \
        --log /tmp/dependency-check.log \
        &

      SCAN_PID=$!
      while kill -0 $SCAN_PID 2>/dev/null; do
        echo "Scan still running... $(date)"
        ps aux | grep "[d]ependency-check" || true
        sleep 30
      done
      wait $SCAN_PID
      EXIT_CODE=$?

      if [[ $EXIT_CODE -ne 0 ]]; then
        echo "Dependency check failed"
        echo "=== Dependency Check Log ==="
        cat /tmp/dependency-check.log || echo "No log file found"
        echo "=== End Log ==="
        exit $EXIT_CODE
      fi
      echo "Scan completed, checking output:"
      ls -la owasp-report/
  services: []
  variables:
    DOCKER_DRIVER: overlay2
  artifacts:
    paths:
      - owasp-report/
    expire_in: 1 week
  rules:
    - if:
        '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME ==
        "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      when: always
    - when: never

trivy_image_scan:
  stage: security
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl bash
    - docker builder prune -a --force
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  script:
    - docker build --no-cache -f backend/Dockerfile.prod -t backend-image .
    - docker build --no-cache -f client/Dockerfile.prod -t client-image .
    - ./bin/trivy image --exit-code 1 --severity HIGH,CRITICAL backend-image
    - ./bin/trivy image --exit-code 1 --severity HIGH,CRITICAL client-image
  rules:
    - if:
        '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME ==
        "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      when: always
    - when: never

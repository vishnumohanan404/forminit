trivy_fs_scan:
  stage: security
  image: node:18
  before_script:
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  script:
    - ./bin/trivy fs . --exit-code 1 --severity HIGH,CRITICAL
  rules:
    - if:
        '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME ==
        "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      when: always
    - when: never

owasp_dep_check:
  stage: security
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  before_script: []
  script:
    - |
      cd "$CI_PROJECT_DIR"
      mkdir -p owasp-report
      echo "Current directory: $(pwd)"
      echo "Scanning directory contents:"
      ls -la ./client || echo "Client directory not found"
      /usr/share/dependency-check/bin/dependency-check.sh \
        --project "forminit" \
        --scan ./client \
        --scan ./backend \
        --format HTML \
        --out owasp-report/ \
        --nvdApiKey "${NVD_API_KEY}"
      echo "Scan completed, checking output:"
      ls -la owasp-report/
  artifacts:
    paths:
      - owasp-report/
    expire_in: 1 week
  rules:
    - if:
        '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME ==
        "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      when: always
    - when: never


trivy_image_scan:
  stage: security
  image: docker:24.0.7
  services:
    - name: docker:24.0.7-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl bash
    - docker builder prune -a --force
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  script:
    - docker build --no-cache -f backend/Dockerfile.prod -t backend-image .
    - docker build --no-cache -f client/Dockerfile.prod -t client-image .
    - ./bin/trivy image --exit-code 1 --severity HIGH,CRITICAL backend-image
    - ./bin/trivy image --exit-code 1 --severity HIGH,CRITICAL client-image
  rules:
    - if:
        '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME ==
        "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      when: always
    - when: never
